<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫雷 - 登录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>💣 扫雷</h1>
      <p class="subtitle">登录以保存成绩，参与排名</p>

      <div id="errorMsg" class="error-msg"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username" maxlength="16">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="regUser" placeholder="2-16个字符" maxlength="16">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPass" placeholder="至少4位密码">
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input type="password" id="regPass2" placeholder="再次输入密码">
        </div>
        <button type="submit" class="btn btn-primary">注册</button>
      </form>

      <button id="switchBtn" class="btn btn-secondary">还没有账号？去注册</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
